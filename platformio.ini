[env:esp32dev]
platform  = espressif32   ; Core 2.x API (ledcSetup/ledcAttachPin) – kompatibel mit allen Versionen
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

; LittleFS Partition für persistente Logs (überlebt OTA + Reset)
board_build.partitions = min_spiffs.csv
board_build.filesystem = littlefs

lib_deps =
    adafruit/Adafruit VEML7700 Library
    adafruit/RTClib
    bblanchon/ArduinoJson
    knolleary/PubSubClient
    adafruit/Adafruit BME280 Library
    adafruit/Adafruit Unified Sensor

; WICHTIG: WiFi.cpp explizit ausschließen.
; Auf Windows (case-insensitives Dateisystem) würde eine Datei
; namens "WiFi.cpp" im src-Ordner den Arduino-Framework-Header
; <WiFi.h> für den gesamten Build unsichtbar machen.
; Falls du src/WiFi.cpp noch auf der Festplatte hast: bitte löschen!
build_flags = -DCORE_DEBUG_LEVEL=0 -DCONFIG_LITTLEFS_FOR_IDF_3_2
